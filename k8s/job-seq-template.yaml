apiVersion: batch/v1
kind: Job
metadata:
  name: JOB_NAME_HERE
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: NODE_NAME_HERE
      containers:
        - name: mc-worker
          image: IMAGE_HERE
          imagePullPolicy: IfNotPresent
          args:
            - "--type=$(TASK_TYPE)"
            - "--samples=$(TOTAL_SAMPLES)"
            - "--seed=$(SEED)"
            - "--task=0"
            # integral params (игнорируются если type=pi)
            - "--dim=$(INTEGRAL_DIM)"
            - "--a=$(INTEGRAL_A)"
            - "--b=$(INTEGRAL_B)"
            - "--expr=$(INTEGRAL_EXPR)"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            # seed фиксируем для повторяемости
            - name: SEED
              value: "1"

            # TOTAL_SAMPLES меняется скриптом
            - name: TOTAL_SAMPLES
              value: "200000000"

            # всё остальное берём из ConfigMap mc-task
            - name: TASK_TYPE
              valueFrom:
                configMapKeyRef:
                  name: mc-task
                  key: TASK_TYPE
            - name: INTEGRAL_DIM
              valueFrom:
                configMapKeyRef:
                  name: mc-task
                  key: INTEGRAL_DIM
            - name: INTEGRAL_A
              valueFrom:
                configMapKeyRef:
                  name: mc-task
                  key: INTEGRAL_A
            - name: INTEGRAL_B
              valueFrom:
                configMapKeyRef:
                  name: mc-task
                  key: INTEGRAL_B
            - name: INTEGRAL_EXPR
              valueFrom:
                configMapKeyRef:
                  name: mc-task
                  key: INTEGRAL_EXPR
          resources:
            requests:
              cpu: "1"
            limits:
              cpu: "1"