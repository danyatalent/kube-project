apiVersion: batch/v1
kind: Job
metadata:
  name: mc-naive-parallel
spec:
  completions: 30
  parallelism: 30
  completionMode: Indexed
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mc-worker
          image: IMAGE_HERE
          imagePullPolicy: IfNotPresent
          args:
            - "--type=$(TASK_TYPE)"
            - "--samples=$(SAMPLES_PER_POD)"
            - "--seed=$(SEED)"
            - "--task=$(TASK_ID)"
            # integral params (будут игнорироваться в pi режиме)
            - "--a=$(INTEGRAL_A)"
            - "--b=$(INTEGRAL_B)"
            - "--expr=$(INTEGRAL_EXPR)"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: NODE_NAME
              valueFrom:
                fieldRef: { fieldPath: spec.nodeName }
            - name: TASK_ID
              valueFrom:
                fieldRef: { fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index'] }
            - name: SEED
              valueFrom:
                fieldRef: { fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index'] }

            # DEFAULTS (скрипт будет менять)
            - name: TASK_TYPE
              value: "pi"
            - name: SAMPLES_PER_POD
              value: "50000000"

            # integral defaults
            - name: INTEGRAL_A
              value: "0"
            - name: INTEGRAL_B
              value: "3.141592653589793"
            - name: INTEGRAL_EXPR
              value: "sin(x)"
          resources:
            requests:
              cpu: "1"
            limits:
              cpu: "1"