apiVersion: batch/v1
kind: Job
metadata:
  name: mc-naive-parallel-second
spec:
  completions: 40
  parallelism: 40
  completionMode: Indexed
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never

      # Разрешаем ТОЛЬКО ЭТОМУ job садиться на control-plane
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: mc-worker
          image: IMAGE_HERE
          imagePullPolicy: IfNotPresent
          args:
            - "--type=$(TASK_TYPE)"
            - "--samples=$(SAMPLES_PER_POD)"
            - "--seed=$(SEED)"
            - "--task=$(TASK_ID)"
            - "--dim=$(INTEGRAL_DIM)"
            - "--a=$(INTEGRAL_A)"
            - "--b=$(INTEGRAL_B)"
            - "--expr=$(INTEGRAL_EXPR)"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: NODE_NAME
              valueFrom:
                fieldRef: { fieldPath: spec.nodeName }

            # Indexed Job completion index (0..completions-1)
            - name: TASK_ID
              valueFrom:
                fieldRef: { fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index'] }
            - name: SEED
              valueFrom:
                fieldRef: { fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index'] }

            # Task selection from ConfigMap
            - name: TASK_TYPE
              valueFrom:
                configMapKeyRef: { name: mc-task, key: TASK_TYPE }
            - name: INTEGRAL_DIM
              valueFrom:
                configMapKeyRef: { name: mc-task, key: INTEGRAL_DIM }
            - name: INTEGRAL_A
              valueFrom:
                configMapKeyRef: { name: mc-task, key: INTEGRAL_A }
            - name: INTEGRAL_B
              valueFrom:
                configMapKeyRef: { name: mc-task, key: INTEGRAL_B }
            - name: INTEGRAL_EXPR
              valueFrom:
                configMapKeyRef: { name: mc-task, key: INTEGRAL_EXPR }

            # workload size (скрипт/ручная правка)
            - name: SAMPLES_PER_POD
              value: "30000000"

          resources:
            requests:
              cpu: "1"
            limits:
              cpu: "1"