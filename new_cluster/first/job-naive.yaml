apiVersion: batch/v1
kind: Job
metadata:
  name: mc-naive-sweep
spec:
  completions: __K__
  parallelism: __K__
  completionMode: Indexed
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never

      containers:
        - name: mc-worker
          image: danekw8/mc-worker:0.3
          imagePullPolicy: IfNotPresent
          args:
            - "--type=$(TASK_TYPE)"
            - "--samples=$(SAMPLES_PER_POD)"
            - "--seed=$(SEED)"
            - "--task=$(TASK_ID)"
            - "--dim=$(INTEGRAL_DIM)"
            - "--a=$(INTEGRAL_A)"
            - "--b=$(INTEGRAL_B)"
            - "--expr=$(INTEGRAL_EXPR)"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: NODE_NAME
              valueFrom:
                fieldRef: { fieldPath: spec.nodeName }
            - name: TASK_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
            - name: SEED
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']

            - name: TASK_TYPE
              valueFrom:
                configMapKeyRef: { name: mc-task, key: TASK_TYPE }
            - name: INTEGRAL_DIM
              valueFrom:
                configMapKeyRef: { name: mc-task, key: INTEGRAL_DIM }
            - name: INTEGRAL_A
              valueFrom:
                configMapKeyRef: { name: mc-task, key: INTEGRAL_A }
            - name: INTEGRAL_B
              valueFrom:
                configMapKeyRef: { name: mc-task, key: INTEGRAL_B }
            - name: INTEGRAL_EXPR
              valueFrom:
                configMapKeyRef: { name: mc-task, key: INTEGRAL_EXPR }

            - name: SAMPLES_PER_POD
              value: "__SAMPLES__"

          resources:
            requests:
              cpu: "500m"
            limits:
              cpu: "500m"